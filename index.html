<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Whispering Subtitles</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: rgba(255, 255, 255, 0.92);
      --ink: #101623;
      --muted: #687385;
      --soft: #eef2f7;
      --line: #e3e8f0;
      --accent: #2563eb;
      --accent-2: #17b8a6;
      --danger: #c2414b;
      --shadow: 0 20px 60px rgba(38, 52, 77, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.16), transparent 30%),
        radial-gradient(circle at top right, rgba(23, 184, 166, 0.15), transparent 32%),
        var(--bg);
      color: var(--ink);
    }

    .app {
      width: min(100%, 520px);
      min-height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      padding: max(14px, env(safe-area-inset-top)) 14px max(16px, env(safe-area-inset-bottom));
    }

    header {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 8px 2px 18px;
    }

    .mark {
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      box-shadow: 0 10px 26px rgba(37, 99, 235, 0.28);
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.12;
      font-weight: 800;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 12px;
    }

    .upload-box,
    .result {
      background: var(--panel);
      border: 1px solid rgba(227, 232, 240, 0.9);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .upload-box {
      padding: 12px;
    }

    .drop-zone {
      display: grid;
      place-items: center;
      min-height: 220px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(246, 249, 253, 0.92)),
        var(--soft);
      text-align: center;
      cursor: pointer;
      transition: border-color 180ms ease, transform 180ms ease, box-shadow 180ms ease;
    }

    .drop-zone:hover,
    .drop-zone.dragging {
      border-color: rgba(37, 99, 235, 0.55);
      transform: translateY(-1px);
      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.12);
    }

    .upload-icon {
      width: 58px;
      height: 58px;
      margin: 0 auto 14px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.14), rgba(23, 184, 166, 0.16));
      color: var(--accent);
    }

    .drop-title {
      display: block;
      margin: 0;
      font-size: 19px;
      font-weight: 800;
    }

    .drop-text {
      display: block;
      max-width: 280px;
      margin: 7px auto 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.38;
    }

    input[type="file"] {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .file-chip {
      display: none;
      align-items: center;
      gap: 9px;
      margin-top: 10px;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #f8fafc;
      color: #334155;
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .file-chip.visible {
      display: flex;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 9px;
      margin-top: 10px;
    }

    button {
      min-height: 52px;
      border: 0;
      border-radius: 15px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 160ms ease, opacity 160ms ease, background 160ms ease;
    }

    button:active {
      transform: scale(0.985);
    }

    .primary {
      background: #111827;
      color: white;
      box-shadow: 0 12px 26px rgba(17, 24, 39, 0.16);
    }

    .primary:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      box-shadow: none;
    }

    .ghost {
      width: 52px;
      background: #edf2f7;
      color: #475569;
    }

    .result {
      padding: 14px;
      min-height: 174px;
    }

    .result-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .result-title {
      margin: 0;
      font-size: 14px;
      font-weight: 800;
      color: #273449;
    }

    .status {
      min-height: 24px;
      display: inline-flex;
      align-items: center;
      padding: 0 9px;
      border-radius: 999px;
      background: #f1f5f9;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    textarea {
      width: 100%;
      min-height: 122px;
      resize: vertical;
      border: 0;
      outline: 0;
      padding: 2px 0 0;
      color: var(--ink);
      background: transparent;
      font: 15px/1.55 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    textarea::placeholder {
      color: #98a4b3;
    }

    .error {
      color: var(--danger);
      background: #fff1f2;
    }

    @media (min-height: 760px) {
      .app {
        padding-top: max(22px, env(safe-area-inset-top));
      }

      main {
        padding-bottom: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="mark" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 3.5c3.9 0 7.1 2.8 7.1 6.3 0 2.1-1.2 4-3 5.1l.4 3.1-3.1-1.7c-.5.1-.9.1-1.4.1-3.9 0-7.1-2.8-7.1-6.3S8.1 3.5 12 3.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          <path d="M9 10h6M10.5 13h3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <h1>Whispering Subtitles</h1>
        <p class="subtitle">AI speech to text для Telegram Mini App</p>
      </div>
    </header>

    <main>
      <section class="upload-box" aria-label="Загрузка файла">
        <label class="drop-zone" id="dropZone" for="fileInput">
          <span>
            <span class="upload-icon" aria-hidden="true">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                <path d="M12 15V4m0 0 4 4m-4-4L8 8M5 15v3a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span class="drop-title">Загрузить файл</span>
            <span class="drop-text">Аудио или видео отправится в GPT Whisper и вернется текстом.</span>
          </span>
        </label>
        <input id="fileInput" type="file" accept="audio/*,video/*">
        <div class="file-chip" id="fileChip"></div>

        <div class="actions">
          <button class="primary" id="transcribeBtn" type="button" disabled>Распознать</button>
          <button class="ghost" id="copyBtn" type="button" title="Скопировать текст" aria-label="Скопировать текст">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M8 8h10v12H8zM6 16H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </section>

      <section class="result" aria-label="Результат распознавания">
        <div class="result-top">
          <p class="result-title">Speech to text</p>
          <span class="status" id="status">Ожидает файл</span>
        </div>
        <textarea id="output" placeholder="Здесь появится расшифровка..." readonly></textarea>
      </section>
    </main>
  </div>

  <script>
    const groq_api = "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";
    const model = "whisper-large-v3-turbo";

    const fileInput = document.getElementById("fileInput");
    const dropZone = document.getElementById("dropZone");
    const fileChip = document.getElementById("fileChip");
    const transcribeBtn = document.getElementById("transcribeBtn");
    const copyBtn = document.getElementById("copyBtn");
    const output = document.getElementById("output");
    const statusText = document.getElementById("status");

    let selectedFile = null;

    function setStatus(text, isError = false) {
      statusText.textContent = text;
      statusText.classList.toggle("error", isError);
    }

    function setFile(file) {
      selectedFile = file;
      output.value = "";
      transcribeBtn.disabled = !file;
      fileChip.classList.toggle("visible", Boolean(file));
      fileChip.textContent = file ? `${file.name} · ${(file.size / 1024 / 1024).toFixed(2)} MB` : "";
      setStatus(file ? "Файл выбран" : "Ожидает файл");
    }

    fileInput.addEventListener("change", () => {
      setFile(fileInput.files[0] || null);
    });

    ["dragenter", "dragover"].forEach((eventName) => {
      dropZone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropZone.classList.add("dragging");
      });
    });

    ["dragleave", "drop"].forEach((eventName) => {
      dropZone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropZone.classList.remove("dragging");
      });
    });

    dropZone.addEventListener("drop", (event) => {
      const file = event.dataTransfer.files[0];
      if (file) setFile(file);
    });

    transcribeBtn.addEventListener("click", async () => {
      if (!selectedFile) return;

      if (groq_api === "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") {
        setStatus("Замени API ключ", true);
        output.value = "В коде HTML замени const groq_api = \"API\" на свой Groq API ключ.";
        return;
      }

      const formData = new FormData();
      formData.append("file", selectedFile);
      formData.append("model", model);
      formData.append("response_format", "json");

      transcribeBtn.disabled = true;
      setStatus("Распознаю...");
      output.value = "";

      try {
        const response = await fetch("https://api.groq.com/openai/v1/audio/transcriptions", {
          method: "POST",
          headers: {
            Authorization: `Bearer ${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}`
          },
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error?.message || "Не удалось распознать файл");
        }

        output.value = data.text || "";
        setStatus("Готово");
      } catch (error) {
        output.value = "";
        setStatus(error.message, true);
      } finally {
        transcribeBtn.disabled = false;
      }
    });

    copyBtn.addEventListener("click", async () => {
      if (!output.value.trim()) return;
      await navigator.clipboard.writeText(output.value);
      setStatus("Скопировано");
    });
  </script>
</body>
</html>
